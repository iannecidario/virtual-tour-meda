<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#BE1622">
    <meta
      name="description"
      content="Visualizzatore panoramico 360 gradi del Museo Etnografico di Aquilonia."
    >
    <title>MEdA | Visualizzatore 360</title>
    <link rel="icon" href="./assets/icons/meda-mark.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.14.3/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5.14.3/index.css">
    <link rel="stylesheet" href="./css/styles.css?v=20260720-1">
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
          "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.14.3/index.module.js",
          "@photo-sphere-viewer/gyroscope-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gyroscope-plugin@5.14.3/index.module.js",
          "@photo-sphere-viewer/markers-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5.14.3/index.module.js"
        }
      }
    </script>
  </head>
  <body data-app-mode="visitor">
    <div class="app-shell">
      <header class="topbar" aria-label="Intestazione del museo">
        <a class="brand" href="./" aria-label="MEdA - Museo Etnografico di Aquilonia">
          <picture>
            <source media="(min-width: 1024px)" srcset="./assets/brand/meda-orizzontale-rosso.png">
            <img
              class="brand-logo"
              src="./assets/brand/meda-verticale-rosso.png"
              alt="MEdA - Museo Etnografico di Aquilonia Beniamino Tartaglia"
              width="846"
              height="828"
            >
          </picture>
        </a>
        <button class="environments-toggle" id="environments-toggle" type="button" aria-controls="environments-panel" aria-expanded="false">
          Ambienti
        </button>
        <p class="scene-title" id="scene-title">Casa Contadina</p>
      </header>

      <main class="viewer-stage" aria-label="Visualizzatore panoramico a 360 gradi">
        <p class="app-message" id="app-message" role="status" aria-live="polite" hidden></p>
        <aside class="environments-panel" id="environments-panel" aria-labelledby="environments-title" aria-hidden="true" hidden>
          <header>
            <h2 id="environments-title">Ambienti</h2>
            <button class="icon-action" type="button" data-environments-action="close" aria-label="Chiudi">
              <span aria-hidden="true">x</span>
            </button>
          </header>
          <div class="environments-list" id="environments-list"></div>
        </aside>
        <section class="viewer-panel" aria-labelledby="scene-title">
          <div class="loading-overlay" id="loading-overlay" aria-live="polite">
            <div class="loading-mark" aria-hidden="true"></div>
            <span>Caricamento panorama</span>
          </div>
          <div id="viewer" class="panorama-viewer"></div>
        </section>

      </main>

      <footer class="statusbar" aria-label="Informazioni sul visualizzatore">
        <span>Muovi, esplora e ingrandisci la sala</span>
        <span>Schermo intero disponibile dai controlli</span>
      </footer>
    </div>

    <aside class="info-panel" id="info-panel" aria-labelledby="info-panel-title" aria-live="polite" aria-hidden="true" inert>
      <div class="info-panel__sheet">
        <header class="info-panel__header">
          <span class="info-panel__eyebrow">Scheda catalogo</span>
          <button class="icon-action" type="button" data-info-panel-action="close" aria-label="Chiudi">
            <span aria-hidden="true">x</span>
          </button>
        </header>

        <div class="info-panel__content">
          <h2 id="info-panel-title"></h2>
          <p class="info-panel__category" id="info-panel-category"></p>
          <div class="info-panel__blocks" id="info-panel-blocks"></div>
        </div>

        <footer class="info-panel__footer">
          <button type="button" data-info-panel-action="close">Chiudi</button>
        </footer>
      </div>
    </aside>

    <script type="module" src="./js/app.js?v=20260720-1"></script>
  </body>
</html>
